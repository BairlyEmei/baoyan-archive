name: PR Check

# 触发条件：当有向 main 分支发起的 Pull Request 时触发
on:
  pull_request:
    paths:
      - 'src/content/docs/统计专业档案/**.md'
      - 'config/link-allowlist.txt'

jobs:
  # 任务 1：链接安全与白名单策略检查
  link-policy-check:
    name: 🛡️ Link Policy & Allowlist Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check new URLs against allowlist
        run: |
          set -euo pipefail
          # 使用 git diff 获取 PR 新增内容（无需 gh CLI 或额外 token）
          BASE_SHA=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          git diff "${BASE_SHA}" HEAD -- 'src/content/docs/统计专业档案/**.md' \
            | python scripts/check_new_urls.py

  # 任务 2：Markdown 格式规范检查
  markdown-lint:
    name: 规范化排版检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          # 指定只检查修改的档案文件
          globs: "src/content/docs/统计专业档案/*.md"
        # 允许失败，这样即使格式有小瑕疵，也不会直接阻塞后续检查，由 Maintainer 决定
        continue-on-error: true

  # 任务 3：死链与官方网址有效性排查
  lychee-check:
    name: 🔗 Lychee Link Checker
    runs-on: ubuntu-latest
    needs: link-policy-check
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          # 忽略由于反爬虫 (如知乎) 和防火墙 (如人大) 导致的失败，放宽超时时间，接受200/403/429
          # 仅检查 http/https 链接，跳过相对路径文件链接（如内部导航链接）
          args: >-
            --scheme https
            --scheme http
            --exclude "zhihu\.com"
            --exclude "ruc\.edu\.cn"
            --timeout 15
            --accept 200,403,429
            "src/content/docs/统计专业档案/**/*.md"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: 自动评论检查结果
        # 如果链接检查失败，在 PR 下面自动评论提醒用户或维护者
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ⚠️ **自动化检测提醒**：我们在您提交的档案中发现了无法访问的网址（死链）。
            请维护团队或提交者检查该院校的官方通知链接是否已更新或失效。详细信息请查看本次 Action 的 Logs。
