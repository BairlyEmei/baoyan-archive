name: PR Check

# 触发条件：当有向 main 分支发起的 Pull Request 时触发
on:
  pull_request:
    paths:
      - 'src/content/docs/统计专业档案/**.md'
      - 'config/link-allowlist.txt'

jobs:
  # 任务 1：链接安全与白名单策略检查
  link-policy-check:
    name: 🛡️ Link Policy & Allowlist Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check new URLs against allowlist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 提取 PR 中新增的内容行
          gh pr diff ${{ github.event.pull_request.number }} | grep "^+[^+]" > diff_adds.txt || true

          python -c '
          import re, sys, fnmatch, ipaddress
          from urllib.parse import urlparse

          # 读取新增行
          with open("diff_adds.txt", "r", encoding="utf-8") as f:
              added_lines = f.readlines()

          # 读取白名单
          try:
              with open("config/link-allowlist.txt", "r", encoding="utf-8") as f:
                  allowlist = [line.strip() for line in f if line.strip() and not line.startswith("#")]
          except FileNotFoundError:
              print("⚠️ 未找到 config/link-allowlist.txt，跳过检查。")
              sys.exit(0)

          url_pattern = re.compile(r"https?://[^\s<>\"'\)]+")
          bad_urls = []

          for line in added_lines:
              urls = url_pattern.findall(line)
              for url in urls:
                  domain = urlparse(url).netloc.split(":")[0]

                  # 拦截裸 IP 和常见短链
                  is_ip = False
                  try:
                      ipaddress.ip_address(domain)
                      is_ip = True
                  except ValueError:
                      pass
                  if is_ip or domain in ["t.co", "bit.ly", "suo.im", "is.gd", "tinyurl.com"]:
                      bad_urls.append((url, "禁止使用裸 IP 或短网址"))
                      continue

                  # 白名单匹配
                  allowed = any(fnmatch.fnmatch(domain, pattern) or domain == pattern for pattern in allowlist)
                  if not allowed:
                      bad_urls.append((url, f"域名 {domain} 不在白名单中"))

          if bad_urls:
              print("❌ 发现违规链接！PR 包含不在白名单或被禁止的域名：\n")
              for url, reason in bad_urls:
                  print(f"  - {url} ({reason})")
              print("\n💡 修复建议：")
              print("请确保链接是官方来源。如果该域名是合法的学校/机构官网，请在本次 PR 中修改 `config/link-allowlist.txt` 申请加白。")
              sys.exit(1)
          else:
              print("✅ 新增链接域名安全检查通过！")
          '

  # 任务 2：Markdown 格式规范检查
  markdown-lint:
    name: 规范化排版检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          # 指定只检查修改的档案文件
          globs: "src/content/docs/统计专业档案/*.md"
        # 允许失败，这样即使格式有小瑕疵，也不会直接阻塞后续检查，由 Maintainer 决定
        continue-on-error: true

  # 任务 3：死链与官方网址有效性排查
  lychee-check:
    name: 🔗 Lychee Link Checker
    runs-on: ubuntu-latest
    needs: link-policy-check
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          # 忽略由于反爬虫 (如知乎) 和防火墙 (如人大) 导致的失败，放宽超时时间，接受403
          args: >-
            --exclude "zhihu\.com"
            --exclude "ruc\.edu\.cn"
            --timeout 15
            --accept 403,429
            "src/content/docs/统计专业档案/**/*.md"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: 自动评论检查结果
        # 如果链接检查失败，在 PR 下面自动评论提醒用户或维护者
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ⚠️ **自动化检测提醒**：我们在您提交的档案中发现了无法访问的网址（死链）。
            请维护团队或提交者检查该院校的官方通知链接是否已更新或失效。详细信息请查看本次 Action 的 Logs。
